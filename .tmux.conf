##### в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ  TMUX CONF вҖ” P10K/SNAZZY PALETTE  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Basic setup
unbind C-b
set -g prefix C-space
bind  C-space send-prefix
set -g escape-time 0
set -g history-limit 50000

##### в”Җв”Җ Plugins в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
run '~/.tmux/plugins/tpm/tpm'

##### в”Җв”Җ Resurrect & Continuum в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g @resurrect-capture-pane-contents 'on'

##### в”Җв”Җ Terminal / Clipboard / Mouse в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g set-clipboard on

##### в”Җв”Җ Status-line position в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g status-position top

##### в”Җв”Җ Snazzy / p10k Colour Palette в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# (matches your Alacritty + p10k)
set -g status-bg "#1a1b26"          # dark background
set -g status-fg "#F1F1F0"          # light foreground / white
##### в”Җв”Җ Window (tab) styles в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set-window-option -g window-status-current-style "fg=#1a1b26,bg=#57C7FF,bold"
set-window-option -g window-status-style         "fg=colour242,bg=#282a36"

##### в”Җв”Җ Pane borders в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g pane-border-style        "fg=#282a36"
set -g pane-active-border-style "fg=#57C7FF"

##### в”Җв”Җ Message styling (copy-mode prompts etc.) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g message-style "fg=#F1F1F0,bg=#44475a,bold"

##### в”Җв”Җ Status-line content в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g status-left-length  40
set -g status-right-length 100

set -g status-left  "#[fg=#FF6AC1,bold] #S #[fg=colour242]"
set -g status-right "#[fg=#9AEDFE,bold] %Y-%m-%d #[fg=#F3F99D,bold] %I:%M %p "

# Window titles
setw -g window-status-format         "#[fg=colour242] #I:#W #[default]"
setw -g window-status-current-format "#[fg=#1a1b26,bg=#57C7FF,bold] #I:#W #[default]"

##### в”Җв”Җ Keybindings (navigation & copy-mode) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind q killp
bind-key -n C-PageDown next-window
bind-key -n C-PageUp   previous-window
bind -n   S-PageUp     copy-mode -u
bind -n   S-PageDown   send-keys -X page-down
bind -n M-Right next-window      # вҢҘвҶ’  or  вҢҘвҢҳвҶ’
bind -n M-Left  previous-window  # вҢҘвҶҗ  or  вҢҘвҢҳвҶҗ

set -g mode-keys   vi
set -g status-keys vi

bind-key -T copy-mode     MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
bind-key -T copy-mode-vi  MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
bind -T copy-mode-vi Y send -X copy-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -Tcopy-mode-vi WheelUpPane   send-keys -X scroll-up
bind -Tcopy-mode-vi WheelDownPane send-keys -X scroll-down
bind  -T copy-mode-vi v send -X begin-selection   # v starts char-wise

# Session chooser
bind s choose-tree -s
##### в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

