unbind C-b
set -g prefix C-space
bind C-space send-prefix

##### ── PLUGINS ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-battery'
##### ── END PLUGINS ────────────────────────────────────────────────────────

# Enable automatic saving of tmux sessions
set -g @resurrect-capture-pane-contents 'on'

# Set the TERM variable for proper color support (24-bit)
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ",screen-256color:Tc"

bind q killp
set -g escape-time 0

# Legacy status colours (overridden by theme below)
set -g status-bg colour235
set -g status-fg colour136

set -g status-position top

# Bind Ctrl+Page Down to switch to the next window
bind-key -n C-PageDown next-window
# Bind Ctrl+Page Up to switch to the previous window
bind-key -n C-PageUp previous-window

set -g mode-keys vi
set -g status-keys vi

bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy

bind -Tcopy-mode-vi WheelUpPane send-keys -X scroll-up
bind -Tcopy-mode-vi WheelDownPane send-keys -X scroll-down

bind -n S-PageUp copy-mode -u
bind -n S-PageDown send-keys -X page-down

set -g set-clipboard on
set -g mouse on
set -g history-limit 20000

# Bind 'prefix + s' to list sessions and switch to the selected one
bind s choose-tree -s

##### ── UI / THEME EXTENSIONS ──────────────────────────────────────────────
# Dracula-matching palette
set -g @drac-bg      '#1a1b26'
set -g @drac-dark    '#282a36'
set -g @drac-fg      '#f8f8f2'
set -g @drac-comment '#6272a4'
set -g @drac-magenta '#ff79c6'
set -g @drac-cyan    '#8be9fd'
set -g @drac-blue    '#bd93f9'
set -g @drac-yellow  '#f1fa8c'

# Powerline glyphs (requires Nerd Font)
set -g @pl-right ''
set -g @pl-left  ''

# Status bar basics
set -g status-interval 1
set -g status-style "fg=#{@drac-fg},bg=#{@drac-bg}"

# tmux-prefix-highlight styling
set -g @prefix_highlight_bg  '#f1fa8c'
set -g @prefix_highlight_fg  '#282a36'
set -g @prefix_highlight_prefix_icon ''
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_output_suffix ' '
set -g @prefix_highlight_show_copy_mode 'on'

# Left: session name + prefix highlight
set -g status-left-length 40
set -g status-left '#[bg=#{@drac-magenta},fg=#{@drac-dark},bold] #S #[bg=#{@drac-bg},fg=#{@drac-magenta}]#{@pl-right} #[default]#{prefix_highlight}'

# Windows (tabs)
set -g window-status-separator ''
set -g window-status-style 'bg=#{@drac-bg},fg=#{@drac-comment}'
set -g window-status-format '#[fg=#{@drac-comment}]#I  #W '
set -g window-status-current-style 'bg=#{@drac-blue},fg=#{@drac-dark},bold'
set -g window-status-current-format '#{@pl-left}#[bg=#{@drac-blue},fg=#{@drac-dark},bold] #I  #W #[bg=#{@drac-bg},fg=#{@drac-blue}]#{@pl-right}'

# Right: battery + clock
set -g status-right-length 60
set -g status-right '#{@pl-left}#[bg=#{@drac-bg},fg=#{@drac-cyan}] #{battery_icon} #{battery_percentage} #[fg=#{@drac-comment}]| %Y-%m-%d %H:%M '

##### ── END UI / THEME EXTENSIONS ──────────────────────────────────────────

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

