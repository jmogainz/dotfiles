# ~/.config/alacritty/alacritty.toml

general.import = ["~/.config/alacritty/dracula.toml"]

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 14

[env]
TERM = "xterm-256color"

[window]

[scrolling]
history = 20000

[[keyboard.bindings]]
key = "K"
mods = "Control"
chars = "\u001b[A"  # This sends the "Up" arrow key sequence

[[keyboard.bindings]]
key = "J"
mods = "Control"
chars = "\u001b[B"  # This sends the "Down" arrow key sequence

# make ⌥⌘→ / ⌥⌘← send **the same sequences**
[[keyboard.bindings]]
key   = "Right"
mods  = "Alt|Command"
chars = "\u001b[1;3C"

[[keyboard.bindings]]
key   = "Left"
mods  = "Alt|Command"
chars = "\u001b[1;3D"

# ── duplicate Alt-Arrow tmux window switch on ⌘⇧[  /  ⌘⇧] ──────────
[[keyboard.bindings]]
key   = "{"      # physical “[” key (⇧ makes it “{”)
mods  = "Command|Shift"
chars = "\u001b[1;3D"   # Meta-Left  → tmux previous-window

[[keyboard.bindings]]
key   = "}"      # physical “]” key (⇧ makes it “}”)
mods  = "Command|Shift"
chars = "\u001b[1;3C"   # Meta-Right → tmux next-window
