# ~/.config/alacritty/alacritty.toml

general.import = ["~/.config/alacritty/dracula.toml"]

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 14

[env]
TERM = "xterm-256color"

[window]
decorations = "buttonless" # no buttons or title bar but keep rounded corners
option_as_alt = "both"

[scrolling]
history = 20000

[[keyboard.bindings]]
key = "K"
mods = "Control"
chars = "\u001b[A"  # This sends the "Up" arrow key sequence

[[keyboard.bindings]]
key = "J"
mods = "Control"
chars = "\u001b[B"  # This sends the "Down" arrow key sequence

############################################################
#  ⌘⌫   – delete the whole line (shell “kill-line” = ^U)
############################################################
[[keyboard.bindings]]
key   = "Back"
mods  = "Command"          # “Super” instead of “Command” on Linux
chars = "\u0015"           # 0x15  =  ^U  (line kill)

############################################################
#  ⌥←/→ – move back/forward a word (shell = ESC b / ESC f)
############################################################
[[keyboard.bindings]]
key   = "Left"
mods  = "Alt"              # Option on macOS
chars = "\u001bb"          # ESC b  (back-a-word)

[[keyboard.bindings]]
key   = "Right"
mods  = "Alt"
chars = "\u001bf"          # ESC f  (forward-a-word)

############################################################
#  ⌘←/→ – jump to beginning / end of line (shell = ^A / ^E)
############################################################
[[keyboard.bindings]]
key   = "Left"
mods  = "Command"
chars = "\u0001"           # 0x01  =  ^A  (beginning of line)

[[keyboard.bindings]]
key   = "Right"
mods  = "Command"
chars = "\u0005"           # 0x05  =  ^E  (end of line)

############################################################
#  ⌥⌘←/→ – keep your existing tmux “tab” (window) navigation
#  (you already have these two lines in your file; repeated here for clarity)
############################################################
[[keyboard.bindings]]
key   = "Left"
mods  = "Alt|Command"
chars = "\u001b[1;3D"      # Meta-Left  → tmux previous-window

[[keyboard.bindings]]
key   = "Right"
mods  = "Alt|Command"
chars = "\u001b[1;3C"      # Meta-Right → tmux next-window

# ── duplicate Alt-Arrow tmux window switch on ⌘⇧[  /  ⌘⇧] ──────────
[[keyboard.bindings]]
key   = "{"      # physical “[” key (⇧ makes it “{”)
mods  = "Command|Shift"
chars = "\u001b[1;3D"   # Meta-Left  → tmux previous-window

[[keyboard.bindings]]
key   = "}"      # physical “]” key (⇧ makes it “}”)
mods  = "Command|Shift"
chars = "\u001b[1;3C"   # Meta-Right → tmux next-window

############################################################
#  ⌘T  – do nothing (override Alacritty’s default SpawnNewInstance)
############################################################
[[keyboard.bindings]]
key    = "T"
mods   = "Command"
action = "None"         # “None” cleanly disables the key :contentReference[oaicite:0]{index=0}

############################################################
#  ⌘W  – behave exactly like ^W (delete previous word)
############################################################
[[keyboard.bindings]]
key   = "W"
mods  = "Command"
chars = "\u0017"        # 0x17 = ^W ETB control-char

############################################################
#  ⌥] / ⌥[ / ⌥u  → forward as real Meta (ESC-prefix) keys
############################################################
[[keyboard.bindings]]
key   = "]"          # physical “]” key
mods  = "Alt"        # Option on macOS
chars = "\u001b]"    # ESC ]   = <M-]>

[[keyboard.bindings]]
key   = "["          # physical “[” key
mods  = "Alt"
chars = "\u001b["    # ESC [   = <M-[>

[[keyboard.bindings]]
key   = "U"          # un-shifted “u”
mods  = "Alt"
chars = "\u001bu"    # ESC u   = <M-u>
